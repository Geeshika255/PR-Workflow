name: PR Workflow

on: push

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: create a file
        run: echo "Hello World" > file.txt
        name: upload a artifact
        uses: actions/upload artifact@v4
        with:
        name: my file
        path: file.txt

  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: download a file
        uses: actions/upload artifact@v4
        with:
        name: my file
         // add a setup to read file.txt
        name: read file.txt
        run: cat file.txt
        
