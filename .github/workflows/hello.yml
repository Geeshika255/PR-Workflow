name: PR Workflow

on: push

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Create a file
        run: echo "Hello World" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt

  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Read file
        run: cat file.txt